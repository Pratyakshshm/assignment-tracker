<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ADT | Analytics</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
</head>
<body>

<nav class="navbar">
  <div class="logo">
    <div class="logo-icon">📘</div>
    <span class="logo-text">ADT</span>
  </div>
  <div class="nav-links">
    <a href="index.html">Dashboard</a>
    <a href="calendar.html">Calendar</a>
    <a class="active" href="analytics.html">Analytics</a>
  </div>
  <div class="nav-user">
    <span class="user-chip" id="userEmail"></span>
    <button class="logout-btn" id="logoutBtn">Sign Out</button>
  </div>
</nav>

<div class="dash">
  <h1>Analytics</h1>
  <p>Visualise your assignment performance at a glance.</p>
</div>

<div class="analytics-container">
  <div class="chart-card">
    <h3>Status Distribution</h3>
    <canvas id="pieChart" width="300" height="300"></canvas>
    <div class="chart-legend" id="pieLegend"></div>
  </div>
  <div class="chart-card">
    <h3>Assignments by Priority</h3>
    <canvas id="barChart" width="400" height="300"></canvas>
  </div>
</div>

<script src="js/analytics.js"></script>
</body>
</html>
