<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ADT | Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080b12;
      --surface: rgba(255,255,255,0.04);
      --surface-hover: rgba(255,255,255,0.07);
      --border: rgba(255,255,255,0.08);
      --accent: #4f8fff;
      --accent2: #7c3aed;
      --text: #f0f4ff;
      --muted: #6b7a99;
      --error: #f87171;
      --success: #34d399;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated background */
    .bg-orbs {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      animation: drift 12s ease-in-out infinite alternate;
    }
    .orb-1 { width: 500px; height: 500px; background: #4f8fff; top: -150px; left: -150px; animation-delay: 0s; }
    .orb-2 { width: 400px; height: 400px; background: #7c3aed; bottom: -100px; right: -100px; animation-delay: -4s; }
    .orb-3 { width: 300px; height: 300px; background: #06b6d4; top: 50%; left: 50%; transform: translate(-50%,-50%); animation-delay: -8s; }

    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to { transform: translate(30px, 20px) scale(1.05); }
    }

    /* Noise texture */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1;
      opacity: 0.4;
    }

    /* Grid lines */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 1;
    }

    /* Card */
    .card {
      position: relative;
      z-index: 10;
      width: 420px;
      background: rgba(255,255,255,0.035);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px;
      box-shadow:
        0 32px 64px rgba(0,0,0,0.5),
        0 0 0 1px rgba(255,255,255,0.04) inset,
        0 1px 0 rgba(255,255,255,0.1) inset;
      animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }
    .logo-icon {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .logo-text {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #fff, #a0b4d6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .tab-row {
      display: flex;
      gap: 4px;
      background: rgba(0,0,0,0.3);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 28px;
    }
    .tab-btn {
      flex: 1;
      padding: 9px;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab-btn.active {
      background: rgba(79,143,255,0.15);
      color: var(--accent);
      box-shadow: 0 0 0 1px rgba(79,143,255,0.25);
    }

    .form-section { display: none; }
    .form-section.active { display: block; }

    .form-title {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .form-sub {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 24px;
    }

    .field {
      margin-bottom: 16px;
    }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 7px;
    }
    .field input {
      width: 100%;
      padding: 12px 14px;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field input:focus {
      border-color: rgba(79,143,255,0.5);
      box-shadow: 0 0 0 3px rgba(79,143,255,0.1);
    }
    .field input::placeholder { color: #3a4560; }

    .submit-btn {
      width: 100%;
      padding: 13px;
      margin-top: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 12px;
      color: white;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      box-shadow: 0 4px 20px rgba(79,143,255,0.3);
    }
    .submit-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 30px rgba(79,143,255,0.45);
    }
    .submit-btn:active { transform: translateY(0); }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .submit-btn .spinner {
      display: none;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin: 0 auto;
    }
    .submit-btn.loading .btn-text { display: none; }
    .submit-btn.loading .spinner { display: block; }

    @keyframes spin { to { transform: rotate(360deg); } }

    .msg {
      margin-top: 14px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      display: none;
    }
    .msg.error { background: rgba(248,113,113,0.1); color: var(--error); border: 1px solid rgba(248,113,113,0.2); }
    .msg.success { background: rgba(52,211,153,0.1); color: var(--success); border: 1px solid rgba(52,211,153,0.2); }
    .msg.visible { display: block; }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: var(--muted);
      font-size: 12px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .user-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: rgba(52,211,153,0.08);
      border: 1px solid rgba(52,211,153,0.15);
      border-radius: 10px;
      font-size: 13px;
      color: var(--success);
      margin-bottom: 16px;
      display: none;
    }
  </style>
</head>
<body>

<div class="bg-orbs">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<div class="card">
  <div class="logo">
    <div class="logo-icon">📘</div>
    <span class="logo-text">Assignment DT</span>
  </div>

  <div class="tab-row">
    <button class="tab-btn active" onclick="switchTab('login')">Sign In</button>
    <button class="tab-btn" onclick="switchTab('register')">Create Account</button>
  </div>

  <!-- LOGIN -->
  <div class="form-section active" id="loginSection">
    <div class="form-title">Welcome back</div>
    <div class="form-sub">Sign in to access your assignments</div>

    <div class="field">
      <label>Email Address</label>
      <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email" />
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password" />
    </div>

    <button class="submit-btn" id="loginBtn" onclick="handleLogin()">
      <span class="btn-text">Sign In →</span>
      <span class="spinner"></span>
    </button>
    <div class="msg" id="loginMsg"></div>
  </div>

  <!-- REGISTER -->
  <div class="form-section" id="registerSection">
    <div class="form-title">Create account</div>
    <div class="form-sub">Start tracking your assignments today</div>

    <div class="field">
      <label>Email Address</label>
      <input type="email" id="regEmail" placeholder="you@example.com" autocomplete="email" />
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="regPassword" placeholder="Min. 6 characters" autocomplete="new-password" />
    </div>
    <div class="field">
      <label>Confirm Password</label>
      <input type="password" id="regConfirm" placeholder="Repeat password" autocomplete="new-password" />
    </div>

    <button class="submit-btn" id="registerBtn" onclick="handleRegister()">
      <span class="btn-text">Create Account →</span>
      <span class="spinner"></span>
    </button>
    <div class="msg" id="registerMsg"></div>
  </div>
</div>

<script>
  const API = 'http://localhost:5000/api';

  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (i===0 && tab==='login') || (i===1 && tab==='register')));
    document.getElementById('loginSection').classList.toggle('active', tab === 'login');
    document.getElementById('registerSection').classList.toggle('active', tab === 'register');
  }

  function showMsg(id, text, type) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = `msg ${type} visible`;
  }

  function setLoading(btn, loading) {
    btn.classList.toggle('loading', loading);
    btn.disabled = loading;
  }

  async function handleLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const btn = document.getElementById('loginBtn');

    if (!email || !password) return showMsg('loginMsg', 'Please fill in all fields.', 'error');

    setLoading(btn, true);
    try {
      const res = await fetch(`${API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Login failed');

      localStorage.setItem('adt_token', data.token);
      localStorage.setItem('adt_email', email);
      showMsg('loginMsg', '✓ Signed in! Redirecting...', 'success');
      setTimeout(() => window.location.href = 'index.html', 800);
    } catch (err) {
      showMsg('loginMsg', err.message, 'error');
      setLoading(btn, false);
    }
  }

  async function handleRegister() {
    const email = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;
    const confirm = document.getElementById('regConfirm').value;
    const btn = document.getElementById('registerBtn');

    if (!email || !password) return showMsg('registerMsg', 'Please fill in all fields.', 'error');
    if (password.length < 6) return showMsg('registerMsg', 'Password must be at least 6 characters.', 'error');
    if (password !== confirm) return showMsg('registerMsg', 'Passwords do not match.', 'error');

    setLoading(btn, true);
    try {
      const res = await fetch(`${API}/auth/signup`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Registration failed');

      showMsg('registerMsg', '✓ Account created! Please sign in.', 'success');
      setTimeout(() => switchTab('login'), 1200);
    } catch (err) {
      showMsg('registerMsg', err.message, 'error');
    } finally {
      setLoading(btn, false);
    }
  }

  // Redirect if already logged in
  if (localStorage.getItem('adt_token')) window.location.href = 'index.html';

  // Enter key support
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const active = document.querySelector('.form-section.active').id;
      if (active === 'loginSection') handleLogin();
      else handleRegister();
    }
  });
</script>
</body>
</html>
